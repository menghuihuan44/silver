<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Compiler Backend — 使用手册</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <style>
        :root { --theme-color: #42b983; }
        .sidebar-nav li > a[href^="#/"]:not([href*="index"]) { font-size: 14px; }
        .app-name-link { font-size: 20px; font-weight: bold; }
        table { display: table; width: 100%; }
    </style>
</head>
<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: 'Silver 使用手册',
            repo: 'https://github.com/menghuihuan44/silver',
            loadSidebar: '_sidebar.md',
            subMaxLevel: 3,
            search: {
                placeholder: '搜索...',
                noData: '没有结果',
                paths: 'auto',
            },
            copyCode: {
                buttonText: '复制',
                errorText: '复制失败',
                successText: '已复制',
            },
            pagination: {
                previousText: '上一节',
                nextText: '下一节',
            },
        };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
